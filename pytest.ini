[pytest]
# ── 測試收集設定 ──────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── 輸出設定 ──────────────────────────────────────────────────────────────────
addopts =
    -v
    -s
    --tb=short

# ── Log 設定 ──────────────────────────────────────────────────────────────────
# 注意：log_file 路徑由 conftest.py 動態設定（帶時間戳），
# 這裡的設定作為 fallback
log_cli = true
log_cli_level = WARNING
log_file_level = INFO
log_file_format = %(asctime)s [%(levelname)s] %(funcName)s - %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
